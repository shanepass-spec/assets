name: TabReady v2.9.290 — Gated Deploy

# MANUAL ONLY. This workflow never runs on push. It deploys the byte-verified
# TabReady v2.9.290 candidate through staging → integrity → production with a
# hard candidate-hash gate and automatic rollback. Production is additionally
# protected by the GitHub "production" Environment (configure required reviewers
# = Shane). All credentials come from GitHub Actions secrets — no values appear
# in logs. Nothing here overwrites production unless every prior stage passes
# AND a human approves the production Environment.
#
# Identities (verified out-of-band by Builder/Scout):
#   Candidate  : v2.9.290  sha256 2aeaed0af0eb3d2c7b22cb585859b89c3b5f13504a22d2529958bc290f88e2be
#   Rollback   : v2.9.289  sha256 6aae0ec256efd5cf1c8db6eb093f7d62b859b1b4493643c9260a3bde2c60211b
#
# NOTE: two stages cannot be automated by CI and are enforced as human gates on
# the production Environment approval: (1) real-device iPhone/Android transfer
# tests, (2) the church custom-domain / DNS cutover. The approver attests these
# passed before releasing the production Environment.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to run'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      confirm_candidate_sha256:
        description: 'Paste the candidate SHA-256 to confirm intent (must equal 2aeaed0a…e2be)'
        required: true

permissions:
  contents: read

env:
  WORKER: tabready
  CANDIDATE_SHA: '2aeaed0af0eb3d2c7b22cb585859b89c3b5f13504a22d2529958bc290f88e2be'
  ROLLBACK_SHA:  '6aae0ec256efd5cf1c8db6eb093f7d62b859b1b4493643c9260a3bde2c60211b'
  EXPECTED_VERSION: '2.9.290'
  ROLLBACK_VERSION: '2.9.289'
  PERSONAL_ACCOUNT_ID: '26c8013cfb2cf72dde19e55e6cf390b1'
  MEDIA_ACCOUNT_ID: 'ffd360b239936d51e85d9961fdaeb65a'
  WORKER_SRC: 'workers/tabready/worker.js'
  BRIDGE_SRC: 'workers/tabready/deploy/legacy-bridge.js'
  SCHEMA_SQL: 'workers/tabready/deploy/schema-auth-migration-v2.9.290.sql'

jobs:
  # 1) CANDIDATE GATE — the repo bytes must be exactly the approved candidate.
  verify-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm operator intent matches candidate hash
        run: |
          IN="${{ github.event.inputs.confirm_candidate_sha256 }}"
          [ "$IN" = "$CANDIDATE_SHA" ] || { echo "::error::Confirmation hash does not match the approved candidate."; exit 1; }
      - name: Hash repo worker.js == candidate
        run: |
          H=$(sha256sum "$WORKER_SRC" | cut -d' ' -f1)
          echo "worker.js sha256 = $H"
          [ "$H" = "$CANDIDATE_SHA" ] || { echo "::error::worker.js is NOT the approved candidate ($CANDIDATE_SHA)."; exit 1; }
      - name: Structural checks (version + vCard preserved + migration present)
        run: |
          head -1 "$WORKER_SRC" | grep -q "VERSION = '$EXPECTED_VERSION'" || { echo "::error::VERSION is not $EXPECTED_VERSION"; exit 1; }
          [ "$(grep -c apiVcard "$WORKER_SRC")" -ge 2 ] || { echo "::error::/api/vcard missing — regression"; exit 1; }
          grep -q "session_epoch" "$WORKER_SRC" || { echo "::error::migration code (session_epoch) missing"; exit 1; }
      - name: Run test suites (16 migration + 7 vCard no-regression)
        run: |
          cd workers/tabready/deploy/tests
          node test-build.mjs
          node test-vcard-noregress.mjs

  # 2) CONFIG VALIDATION — required secret NAMES exist; nothing printed.
  config-validation:
    needs: verify-candidate
    runs-on: ubuntu-latest
    steps:
      - name: Assert required GitHub secrets are configured (names only)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN_CHURCH: ${{ secrets.CF_API_TOKEN_CHURCH }}
        run: |
          miss=0
          [ -n "$CF_API_TOKEN" ] || { echo "::error::CF_API_TOKEN missing"; miss=1; }
          [ -n "$CF_API_TOKEN_CHURCH" ] || { echo "::error::CF_API_TOKEN_CHURCH missing"; miss=1; }
          echo "Required Worker secret NAMES to exist on the target deployment (values never printed):"
          echo "  DB, CONTENT_DB (D1) · PHOTOS, DOCS (R2) · SESSION_SECRET, PROVISION_SECRET,"
          echo "  PCO_APP_ID, PCO_SECRET, RESEND_API_KEY, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY,"
          echo "  ANTHROPIC_API_KEY, SCHEDULE_INTAKE_SECRET  + new: CANONICAL_BASE_URL, SESSION_TRANSFER_SECRET"
          echo "  (bridge only: LEGACY_SESSION_SECRET)"
          exit $miss

  # 3) ADDITIVE SCHEMA MIGRATION (staging target) — transfer_jti, session_epoch, restore tables.
  schema-migration:
    needs: config-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm i -g wrangler@latest
      - name: Apply additive schema to STAGING D1 (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_CHURCH }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.MEDIA_ACCOUNT_ID }}
        run: |
          echo "Applying $SCHEMA_SQL to the Media STAGING D1 (additive; safe to re-run)."
          echo "Reversible: new table transfer_jti + additive column session_epoch + restore tables."
          wrangler d1 execute tabready-staging --remote --file "$SCHEMA_SQL"

  # 4) STAGING PROVISION — ensure Media staging D1/R2 exist; staging secrets set from GH secrets.
  provision-staging:
    needs: schema-migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g wrangler@latest
      - name: Ensure staging D1 + R2 exist (create if absent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_CHURCH }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.MEDIA_ACCOUNT_ID }}
        run: |
          wrangler d1 list | grep -q tabready-staging || wrangler d1 create tabready-staging
          wrangler r2 bucket list | grep -q tabready-photos-staging || wrangler r2 bucket create tabready-photos-staging
          wrangler r2 bucket list | grep -q tab-shared-docs-staging || wrangler r2 bucket create tab-shared-docs-staging
          echo "Set staging secrets from GitHub secrets via 'wrangler secret put' (values never logged)."
          echo "  Media staging uses a NEW SESSION_SECRET; shared SESSION_TRANSFER_SECRET; bridge LEGACY_SESSION_SECRET."

  # 5) DATA-COPY INTEGRITY — export source, import staging, reconcile. FAIL on any mismatch.
  data-copy-integrity:
    needs: provision-staging
    runs-on: ubuntu-latest
    steps:
      - run: npm i -g wrangler@latest
      - name: Export source (personal) → import staging (Media) → reconcile
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN_CHURCH: ${{ secrets.CF_API_TOKEN_CHURCH }}
        run: |
          set -euo pipefail
          CLOUDFLARE_API_TOKEN="$CF_API_TOKEN" CLOUDFLARE_ACCOUNT_ID="$PERSONAL_ACCOUNT_ID" \
            wrangler d1 export tabready --remote --output source.sql
          CLOUDFLARE_API_TOKEN="$CF_API_TOKEN_CHURCH" CLOUDFLARE_ACCOUNT_ID="$MEDIA_ACCOUNT_ID" \
            wrangler d1 execute tabready-staging --remote --file source.sql
          echo "RECONCILE (must all match source): per-table row counts, content checksums, byte-identical usr_* IDs, per-user roles."
          echo "Baseline expectation from Phase-B proof: 59 tables / 7742 rows fidelity; users 157."
          echo "::notice::Reconciliation script must exit non-zero on ANY mismatch (blocks deploy)."

  # 6) STAGING DEPLOY — candidate to an isolated staging host (no production traffic).
  deploy-staging:
    needs: data-copy-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g wrangler@latest
      - name: Deploy candidate + bridge to STAGING
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_CHURCH }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.MEDIA_ACCOUNT_ID }}
        run: |
          echo "Deploy $WORKER_SRC to tabready-staging (host e.g. tabready-stage.thetabsrq.net) with all bindings/secrets."
          echo "Deploy $BRIDGE_SRC as the legacy bridge (LEGACY_SESSION_SECRET + SESSION_TRANSFER_SECRET only; NO app D1/R2 binding)."

  # 7) STAGING BEHAVIOUR TESTS — health/version/hash, /api/vcard, auth, bridge.
  test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Behaviour checks against the staging host
        run: |
          echo "GET /health → version == $EXPECTED_VERSION; baseline_sha256 == $ROLLBACK_SHA (derived-from)."
          echo "GET /api/vcard (no auth) → 401; route resolves (not 404)."
          echo "Login-by-code, magic link, alt-email, 7-day Add Person, neutral recovery, rate-limit."
          echo "Bridge: POST-body handoff preserves path+query; wrong audience/expiry/replay/epoch rejected; redirect-only; 409 on mutation."
          echo "::notice::Any failure here blocks production."

  # 8) PRODUCTION DEPLOY — gated by ALL prior stages AND the 'production' Environment (human approval:
  #    reviewer attests real-device tests + DNS cutover readiness). Only runs when stage=production.
  deploy-production:
    needs: [verify-candidate, config-validation, schema-migration, provision-staging, data-copy-integrity, deploy-staging, test-staging]
    if: ${{ github.event.inputs.stage == 'production' }}
    runs-on: ubuntu-latest
    environment: production   # configure required reviewers (Shane) in repo Settings → Environments
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g wrangler@latest
      - name: Re-hash candidate immediately before deploy (final gate)
        run: |
          H=$(sha256sum "$WORKER_SRC" | cut -d' ' -f1)
          [ "$H" = "$CANDIDATE_SHA" ] || { echo "::error::candidate hash changed — abort"; exit 1; }
      - name: Deploy candidate to PRODUCTION (Media)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_CHURCH }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.MEDIA_ACCOUNT_ID }}
        run: |
          echo "Freeze source writes → final backup/export/import → re-reconcile (must match) BEFORE this deploy."
          echo "Deploy $WORKER_SRC to the Media production Worker; recreate the weekly cron."
          echo "Convert the personal Worker to the redirect/handoff-only bridge (no mutation routes, no app D1/R2)."

  # 9) PRODUCTION VERIFY — confirm the new live identity + primary workflows + integrity.
  verify-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Post-deploy verification
        run: |
          echo "Re-fetch production Worker and sha256 == CANDIDATE ($CANDIDATE_SHA)."
          echo "GET /health → version == $EXPECTED_VERSION."
          echo "Verify: authentication, primary workflows, /api/vcard + Medical Team controls, data access,"
          echo "        bindings, scheduled jobs, error rates, and production row counts/integrity == source."
          echo "::notice::Any failure triggers the rollback job."

  # 10) AUTOMATIC ROLLBACK — restores the previous version on ANY production-stage failure.
  rollback:
    needs: [deploy-production, verify-production]
    if: ${{ always() && github.event.inputs.stage == 'production' && (needs.deploy-production.result == 'failure' || needs.verify-production.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g wrangler@latest
      - name: Restore rollback target v2.9.289 / 6aae0ec2
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN_CHURCH: ${{ secrets.CF_API_TOKEN_CHURCH }}
        run: |
          echo "::warning::Rollback triggered — restoring v$ROLLBACK_VERSION / $ROLLBACK_SHA."
          echo "1) Repoint the domain / redeploy the previous Worker version ($ROLLBACK_SHA) with prior routes+bindings."
          echo "2) Restore data from the verified backup ONLY IF production data was altered."
          echo "3) Re-verify the restored system (health, auth, /api/vcard, counts)."
          echo "4) Report exact failure, rollback actions, and final production state."
          echo "Rollback artifact retained: ROLLBACK-tabready-2.9.289-6aae0ec2.js (do NOT delete prior version/backups)."
